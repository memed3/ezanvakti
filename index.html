<script>
// İkonu canvas ile üret, localStorage'a kaydet, her açılışta tekrar kullan
function generateIconDataURL(size) {
  try {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createRadialGradient(size*.35,size*.25,0,size*.5,size*.5,size*.7);
    grad.addColorStop(0,'#0d2a50'); grad.addColorStop(1,'#05101f');
    ctx.fillStyle=grad; ctx.fillRect(0,0,size,size);
    const cx=size*.38,cy=size*.32,r=size*.18;
    ctx.fillStyle='#c9a84c';
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#061525';
    ctx.beginPath();ctx.arc(cx+r*.35,cy-r*.1,r*.82,0,Math.PI*2);ctx.fill();
    const sx=cx+r*1.1,sy=cy-r*.6,sr=size*.055;
    ctx.fillStyle='#c9a84c';
    ctx.save();ctx.translate(sx,sy);ctx.beginPath();
    for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2,ia=a+Math.PI/5;ctx.lineTo(Math.cos(a)*sr,Math.sin(a)*sr);ctx.lineTo(Math.cos(ia)*sr*.4,Math.sin(ia)*sr*.4);}
    ctx.closePath();ctx.fill();ctx.restore();
    ctx.fillStyle='#c9a84c';ctx.globalAlpha=0.85;
    ctx.beginPath();ctx.arc(size*.5,size*.72,size*.14,Math.PI,0);ctx.fill();
    ctx.fillRect(size*.36,size*.72,size*.28,size*.14);
    ctx.fillRect(size*.3,size*.6,size*.055,size*.26);
    ctx.fillRect(size*.645,size*.6,size*.055,size*.26);
    ctx.beginPath();ctx.arc(size*.327,size*.6,size*.028,Math.PI,0);ctx.fill();
    ctx.beginPath();ctx.arc(size*.673,size*.6,size*.028,Math.PI,0);ctx.fill();
    ctx.beginPath();ctx.arc(size*.5,size*.66,size*.06,Math.PI,0);ctx.fill();
    ctx.globalAlpha=1;
    return canvas.toDataURL('image/png');
  } catch(e){ return ''; }
}

function getOrCreateIcon(size) {
  const key = 'namaz_icon_' + size;
  try {
    const cached = localStorage.getItem(key);
    if(cached) return cached;
  } catch(e){}
  const dataUrl = generateIconDataURL(size);
  try { localStorage.setItem(key, dataUrl); } catch(e){}
  return dataUrl;
}

// Manifest'i data URI olarak göm — blob URL aksine tarayıcı yeniden başlatmada geçerli kalır
function setupPWA() {
  try {
    const icon192 = getOrCreateIcon(192);
    const icon512 = getOrCreateIcon(512);
    const icon180 = getOrCreateIcon(180);

    const manifest = {
      name: "Namaz Vakitleri",
      short_name: "Namaz",
      description: "Diyanet resmi ezan vakitleri",
      start_url: location.href,
      display: "standalone",
      background_color: "#05101f",
      theme_color: "#05101f",
      orientation: "portrait",
      icons: [
        { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
        { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
      ]
    };

    // data: URI — tarayıcı kapanıp açılsa bile geçerli
    const manifestURI = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
    const link = document.createElement('link');
    link.rel = 'manifest'; link.href = manifestURI;
    document.head.appendChild(link);

    // Apple touch icon
    const apple = document.createElement('link');
    apple.rel = 'apple-touch-icon'; apple.href = icon180;
    document.head.appendChild(apple);
  } catch(e){}
}

document.addEventListener('DOMContentLoaded', setupPWA);
</script>

<body>
<div class="sky-bg"></div>
<div class="stars" id="stars"></div>
<div class="mosque"></div>

<div class="app">
  <div class="header">
    <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيمِ</div>
    <div class="app-title">Namaz Vakitleri — Diyanet</div>
  </div>

  <!-- Tema Seçici -->
  <div class="theme-bar">
    <span class="theme-lbl">🎨</span>
    <div class="theme-dot active" data-tema="" style="background:linear-gradient(135deg,#0d2a50,#1a4a7a)" title="Gece Mavisi" onclick="setTema(this,'')"></div>
    <div class="theme-dot" data-tema="tema-yesil" style="background:linear-gradient(135deg,#0a2e1a,#1a6640)" title="Zümrüt" onclick="setTema(this,'tema-yesil')"></div>
    <div class="theme-dot" data-tema="tema-mor" style="background:linear-gradient(135deg,#1a0a40,#5a2a90)" title="Mor Gece" onclick="setTema(this,'tema-mor')"></div>
    <div class="theme-dot" data-tema="tema-toprak" style="background:linear-gradient(135deg,#2a1205,#8a4820)" title="Toprak" onclick="setTema(this,'tema-toprak')"></div>
    <div class="theme-dot" data-tema="tema-bej" style="background:linear-gradient(135deg,#e4d8c4,#c8b890)" title="Aydınlık" onclick="setTema(this,'tema-bej')"></div>
    <div class="theme-dot" data-tema="tema-kirmizi" style="background:linear-gradient(135deg,#2a0808,#8a2010)" title="Koyu Kırmızı" onclick="setTema(this,'tema-kirmizi')"></div>
  </div>

  <!-- Bildirim butonu -->
  <div class="notif-bar">
    <button class="notif-btn" id="notifBtn" onclick="toggleBildirim()">
      <span class="notif-dot"></span>
      <span id="notifTxt">Vakit Bildirimleri Kapat</span>
    </button>
  </div>

  <!-- Şehir paneli (kaydedilmiş varsa gizli başlar) -->
  <div class="city-section gizli" id="citySection">
    <div class="city-label">📍 Konum Seçin</div>
    <div class="city-controls">
      <select id="ilSelect" onchange="onIlChange()">
        <option value="">İl yükleniyor...</option>
      </select>
      <select id="ilceSelect" disabled onchange="onIlceChange()">
        <option value="">İlçe seçin...</option>
      </select>
      <button class="fetch-btn" id="fetchBtn" onclick="fetchVakitler()" disabled>VAKİTLERİ GETİR</button>
    </div>
  </div>
  <div class="city-toggle" id="cityToggle" onclick="toggleCityPanel()">
    <span class="city-toggle-txt" id="cityToggleTxt">📍 Şehri Değiştir</span>
  </div>

  <div id="content">
    <div class="loading" style="opacity:.4"><div class="loading-text">İl seçerek başlayın</div></div>
  </div>
</div>

<script>
// Stars
const se = document.getElementById('stars');
for(let i=0;i<70;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*72}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s`;se.appendChild(s);}

const BASE = 'https://ezanvakti.emushaf.net';
let allVakitler=[], offsetDays=0, countdownInterval=null, ilName='', ilceName='';
let bildirimTimeouts=[];

// ─── localStorage ──────────────────────────────────────────
function saveSelection(ilId,ilText,ilceId,ilceText){
  try{localStorage.setItem('namaz_il',JSON.stringify({id:ilId,text:ilText}));
      localStorage.setItem('namaz_ilce',JSON.stringify({id:ilceId,text:ilceText}));}catch(e){}
}
function loadSavedSelection(){
  try{const il=JSON.parse(localStorage.getItem('namaz_il')||'null');
      const ilce=JSON.parse(localStorage.getItem('namaz_ilce')||'null');
      return(il&&ilce)?{il,ilce}:null;}catch(e){return null;}
}

// ─── Şehir paneli ──────────────────────────────────────────
function toggleCityPanel(){
  const sec=document.getElementById('citySection');
  const lbl=document.getElementById('cityToggleTxt');
  if(sec.classList.contains('acik')){sec.classList.remove('acik');sec.classList.add('gizli');lbl.textContent='📍 Şehri Değiştir';}
  else{sec.classList.remove('gizli');sec.classList.add('acik');lbl.textContent='✕ Kapat';}
}
function showCityPanel(){const sec=document.getElementById('citySection');sec.classList.remove('gizli');sec.classList.add('acik');document.getElementById('cityToggleTxt').textContent='✕ Kapat';}
function hideCityPanel(){const sec=document.getElementById('citySection');sec.classList.remove('acik');sec.classList.add('gizli');document.getElementById('cityToggleTxt').textContent='📍 Şehri Değiştir';}

// ─── Bildirim ──────────────────────────────────────────────
function getBildirimAyar(){try{return localStorage.getItem('namaz_bildirim')!=='kapali';}catch(e){return true;}}
function saveBildirimAyar(a){try{localStorage.setItem('namaz_bildirim',a?'acik':'kapali');}catch(e){}}
function updateNotifUI(){
  const aktif=getBildirimAyar()&&Notification.permission==='granted';
  const btn=document.getElementById('notifBtn');
  const txt=document.getElementById('notifTxt');
  if(!btn)return;
  if(aktif){btn.classList.add('aktif');txt.textContent='🔔 Bildirimler Açık';}
  else{btn.classList.remove('aktif');txt.textContent='🔕 Bildirimleri Aç';}
}
async function toggleBildirim(){
  if(Notification.permission==='denied'){alert('Bildirim izni reddedilmiş. Tarayıcı ayarlarından izin verin.');return;}
  if(Notification.permission==='default'){const p=await Notification.requestPermission();if(p!=='granted'){updateNotifUI();return;}}
  const yeni=!getBildirimAyar();
  saveBildirimAyar(yeni);updateNotifUI();
  if(yeni&&allVakitler.length){ planBildirimler(); baslatKaliciBildirim(); }
  else { bildirimTimeouts.forEach(clearTimeout); durdurKaliciBildirim(); }
}
function planBildirimler(){
  bildirimTimeouts.forEach(clearTimeout);bildirimTimeouts=[];
  if(!getBildirimAyar()||Notification.permission!=='granted'||!allVakitler.length)return;
  const v=allVakitler[getTodayIdx()];if(!v)return;
  const prayers=[
    {key:'Imsak',tr:'İmsak'},{key:'Gunes',tr:'Güneş'},
    {key:'Ogle',tr:'Öğle'},{key:'Ikindi',tr:'İkindi'},
    {key:'Aksam',tr:'Akşam'},{key:'Yatsi',tr:'Yatsı'},
  ];
  const now=new Date();
  prayers.forEach(p=>{
    const t=v[p.key];if(!t)return;
    const[h,m]=t.split(':').map(Number);
    const vt=new Date();vt.setHours(h,m,0,0);
    const diff=vt-now;
    if(diff>0)bildirimTimeouts.push(setTimeout(()=>{
      new Notification(`🕌 ${p.tr} Vakti`,{body:`Saat ${t} — Hayırlı namazlar 🤲`,tag:p.key,silent:false});
    },diff));
    const d10=diff-10*60*1000;
    if(d10>0)bildirimTimeouts.push(setTimeout(()=>{
      new Notification(`⏰ ${p.tr} Vaktine 10 Dakika`,{body:`Saat ${t}'de ${p.tr} vakti girecek.`,tag:p.key+'_10'});
    },d10));
  });
}

// ─── Kalıcı bildirim çubuğu ────────────────────────────────
let kaliciBildirimInterval = null;

function kaliciBildirimGuncelle() {
  if(!getBildirimAyar() || Notification.permission !== 'granted' || !allVakitler.length) return;
  const v = allVakitler[getTodayIdx()];
  if(!v) return;

  const prayers = [
    {key:'Imsak',tr:'İmsak'},{key:'Gunes',tr:'Güneş'},
    {key:'Ogle',tr:'Öğle'},{key:'Ikindi',tr:'İkindi'},
    {key:'Aksam',tr:'Akşam'},{key:'Yatsi',tr:'Yatsı'},
  ];

  const now = new Date();
  const nowM = now.getHours()*60 + now.getMinutes();
  const pMins = prayers.map(p => {
    const t = v[p.key]; if(!t) return 0;
    const[h,m]=t.split(':').map(Number); return h*60+m;
  });

  // Şu anki vakit
  let aktifIdx = -1;
  for(let i=pMins.length-1;i>=0;i--){ if(nowM>=pMins[i]){aktifIdx=i;break;} }
  const nextIdx = aktifIdx < 5 ? aktifIdx+1 : 0;
  const nextP = prayers[nextIdx];
  const nextT = v[nextP.key];

  // Geri sayım hesapla
  let geriSayim = '';
  if(nextT) {
    const[th,tm]=nextT.split(':').map(Number);
    const target=new Date(); target.setHours(th,tm,0,0);
    if(target<=now) target.setDate(target.getDate()+1);
    const diff=target-now;
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
    geriSayim = h>0 ? `${h} saat ${m} dk` : `${m} dk`;
  }

  const aktifP = aktifIdx>=0 ? prayers[aktifIdx] : null;
  const aktifT = aktifIdx>=0 ? v[prayers[aktifIdx].key] : '';

  const baslik = aktifP
    ? `🕌 ${aktifP.tr} Vakti${aktifT ? ' • '+aktifT : ''}`
    : '🕌 Namaz Vakitleri';
  const icerik = nextT
    ? `⏳ ${nextP.tr} vaktine ${geriSayim} kaldı (${nextT}) — ${ilceName||ilName}`
    : `📍 ${ilceName||ilName}`;

  // "persistent" bildirim — tag ile aynı bildirimi günceller, kapatılmaz
  try {
    new Notification(baslik, {
      body: icerik,
      tag: 'namaz-kalici',   // aynı tag → eski bildirimi günceller
      requireInteraction: true, // kullanıcı kapatana kadar durur (Android'de kalıcı)
      silent: true,          // ses çıkarmaz
      renotify: false,
    });
  } catch(e){}
}

function baslatKaliciBildirim() {
  if(kaliciBildirimInterval) clearInterval(kaliciBildirimInterval);
  kaliciBildirimGuncelle();
  // Her dakika güncelle
  kaliciBildirimInterval = setInterval(kaliciBildirimGuncelle, 60*1000);
}

function durdurKaliciBildirim() {
  if(kaliciBildirimInterval) clearInterval(kaliciBildirimInterval);
  kaliciBildirimInterval = null;
}
async function loadIller(){
  try{
    const r=await fetch(`${BASE}/sehirler/2`);const d=await r.json();
    const sel=document.getElementById('ilSelect');
    sel.innerHTML='<option value="">İl seçin...</option>';
    d.forEach(il=>{const o=document.createElement('option');o.value=il.SehirID;o.textContent=il.SehirAdi;sel.appendChild(o);});
    const saved=loadSavedSelection();
    if(saved){sel.value=saved.il.id;if(sel.value){ilName=saved.il.text;await loadIlceler(saved.il.id,saved.ilce.id);}}
    else showCityPanel();
  }catch(e){document.getElementById('ilSelect').innerHTML='<option value="">Hata</option>';showError('İller yüklenemedi.');showCityPanel();}
}
async function loadIlceler(ilId,autoIlceId=null){
  const ilceSel=document.getElementById('ilceSelect');
  document.getElementById('fetchBtn').disabled=true;
  ilceSel.innerHTML='<option value="">Yükleniyor...</option>';ilceSel.disabled=true;
  try{
    const r=await fetch(`${BASE}/ilceler/${ilId}`);const d=await r.json();
    ilceSel.innerHTML='<option value="">İlçe seçin...</option>';
    d.forEach(ilce=>{const o=document.createElement('option');o.value=ilce.IlceID;o.textContent=ilce.IlceAdi;ilceSel.appendChild(o);});
    ilceSel.disabled=false;
    if(autoIlceId){ilceSel.value=autoIlceId;if(ilceSel.value){
      const saved=loadSavedSelection();
      ilceName=saved?.ilce?.text||ilceSel.options[ilceSel.selectedIndex]?.text||'';
      document.getElementById('fetchBtn').disabled=false;
      await fetchVakitler(true);
    }}
  }catch(e){ilceSel.innerHTML='<option value="">Hata</option>';showError('İlçeler yüklenemedi.');}
}
async function onIlChange(){
  const sel=document.getElementById('ilSelect');ilName=sel.options[sel.selectedIndex]?.text||'';
  if(!sel.value)return;await loadIlceler(sel.value);
}
function onIlceChange(){
  const sel=document.getElementById('ilceSelect');
  ilceName=sel.options[sel.selectedIndex]?.text||'';
  document.getElementById('fetchBtn').disabled=!sel.value;
}
async function fetchVakitler(otoMatik=false){
  const ilceSel=document.getElementById('ilceSelect');const id=ilceSel.value;if(!id)return;
  const ilSel=document.getElementById('ilSelect');
  if(ilSel.value)ilName=ilSel.options[ilSel.selectedIndex]?.text||ilName;
  ilceName=ilceSel.options[ilceSel.selectedIndex]?.text||ilceName;
  saveSelection(ilSel.value,ilName,id,ilceName);
  if(!otoMatik)hideCityPanel();
  offsetDays=0;showLoading('Vakitler yükleniyor...');
  try{
    const r=await fetch(`${BASE}/vakitler/${id}`);
    if(!r.ok)throw new Error(`Sunucu hatası: ${r.status}`);
    allVakitler=await r.json();
    if(!allVakitler?.length)throw new Error('Veri boş geldi');
    renderContent();
    if(getBildirimAyar()&&Notification.permission==='granted'){ planBildirimler(); baslatKaliciBildirim(); }
    else if(getBildirimAyar()&&Notification.permission==='default'){
      Notification.requestPermission().then(p=>{if(p==='granted'){saveBildirimAyar(true);updateNotifUI();planBildirimler();baslatKaliciBildirim();}});
    }
  }catch(e){showError(`Vakitler alınamadı.<br><br>Hata: ${e.message}<br><br>İnternet bağlantınızı kontrol edin.`);}
}

// ─── Render ────────────────────────────────────────────────
function getTodayIdx(){
  const t=new Date();
  const iso=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  const kisa=`${String(t.getDate()).padStart(2,'0')}.${String(t.getMonth()+1).padStart(2,'0')}.${t.getFullYear()}`;
  const i=allVakitler.findIndex(v=>(v.MiladiTarihUzunIso8601||'').startsWith(iso)||(v.MiladiTarihKisa===kisa));
  return i>=0?i:0;
}
function renderContent(){
  if(!allVakitler.length){showError('Vakit verisi bulunamadı.');return;}
  const base=getTodayIdx();
  const idx=Math.max(0,Math.min(allVakitler.length-1,base+offsetDays));
  const v=allVakitler[idx];
  const prayers=[
    {tr:'İmsak',ar:'الإمساك',icon:'🌙',time:v.Imsak},
    {tr:'Güneş',ar:'الشروق', icon:'🌅',time:v.Gunes},
    {tr:'Öğle', ar:'الظهر',  icon:'☀️',time:v.Ogle},
    {tr:'İkindi',ar:'العصر', icon:'🌤',time:v.Ikindi},
    {tr:'Akşam',ar:'المغرب', icon:'🌆',time:v.Aksam},
    {tr:'Yatsı',ar:'العشاء', icon:'🌠',time:v.Yatsi},
  ];
  const isToday=offsetDays===0;
  const nowM=new Date().getHours()*60+new Date().getMinutes();
  const pM=prayers.map(p=>{if(!p.time)return 0;const[h,m]=p.time.split(':').map(Number);return h*60+m;});
  let activeIdx=-1;
  if(isToday){for(let i=pM.length-1;i>=0;i--){if(nowM>=pM[i]){activeIdx=i;break;}}}
  const nextIdx=isToday?(activeIdx<5?activeIdx+1:0):-1;
  const dayLabel=offsetDays===0?'Bugün':offsetDays===1?'Yarın':offsetDays===-1?'Dün':`${offsetDays>0?'+':''}${offsetDays} gün`;
  let html=`
    <div class="date-section">
      <div><div class="date-hijri">${v.HicriTarihUzun||''}</div><div class="date-miladi">${v.MiladiTarihUzun||''}</div></div>
      <div style="text-align:right;font-size:12px;color:var(--text-dim)">${ilceName?ilceName+' / ':''}${ilName}</div>
    </div>
    <div class="day-nav">
      <button class="day-btn" onclick="changeDay(-1)">‹</button>
      <span class="day-label">${dayLabel}</span>
      <button class="day-btn" onclick="changeDay(1)">›</button>
    </div>`;
  if(isToday&&nextIdx>=0)html+=`
    <div class="countdown-card">
      <div><div class="countdown-label">Sıradaki Vakit</div>
      <div class="countdown-name">${prayers[nextIdx].tr} &nbsp; ${prayers[nextIdx].ar}</div></div>
      <div class="countdown-time" id="countdown">--:--</div>
    </div>`;
  html+='<div class="prayers-section"><div class="prayer-list">';
  prayers.forEach((p,i)=>{
    const cls=isToday?(i===activeIdx?'active':(i<activeIdx?'passed':'')):'';
    html+=`<div class="prayer-card ${cls}">
      <div class="prayer-icon">${p.icon}</div>
      <div class="prayer-info"><div class="prayer-name-tr">${p.tr}</div><div class="prayer-name-ar">${p.ar}</div></div>
      <div class="prayer-time-wrap">
        <span class="prayer-time">${p.time||'--:--'}</span>
        ${i===activeIdx&&isToday?'<span class="now-badge">● Şu an</span>':''}
      </div></div>`;
  });
  html+='</div></div><div class="ornament">✦ ✦ ✦</div>';
  document.getElementById('content').innerHTML=html;
  if(countdownInterval)clearInterval(countdownInterval);
  if(isToday&&nextIdx>=0)startCountdown(prayers[nextIdx].time);
}
function startCountdown(t){
  const[th,tm]=t.split(':').map(Number);
  function upd(){
    const el=document.getElementById('countdown');if(!el){clearInterval(countdownInterval);return;}
    const now=new Date(),target=new Date();target.setHours(th,tm,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    const d=target-now;
    const h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
    el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  upd();countdownInterval=setInterval(upd,1000);
}
function changeDay(d){offsetDays+=d;if(countdownInterval)clearInterval(countdownInterval);renderContent();}
function showLoading(msg){if(countdownInterval)clearInterval(countdownInterval);document.getElementById('content').innerHTML=`<div class="loading"><div class="loading-ring"></div><div class="loading-text">${msg}</div></div>`;}
function showError(msg){if(countdownInterval)clearInterval(countdownInterval);document.getElementById('content').innerHTML=`<div class="error-msg">${msg}</div>`;}

// ─── Tema ──────────────────────────────────────────────────
const TEMALAR=['','tema-yesil','tema-mor','tema-toprak','tema-bej','tema-kirmizi'];
function setTema(dotEl,tema){
  TEMALAR.forEach(t=>{if(t)document.body.classList.remove(t);});
  if(tema)document.body.classList.add(tema);
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));
  if(dotEl)dotEl.classList.add('active');
  try{localStorage.setItem('namaz_tema',tema);}catch(e){}
}
function applySavedTema(){
  try{const t=localStorage.getItem('namaz_tema')||'';
    if(t)document.body.classList.add(t);
    document.querySelectorAll('.theme-dot').forEach(d=>{
      if(d.dataset.tema===t)d.classList.add('active');else d.classList.remove('active');
    });}catch(e){}
}

// ─── Init ──────────────────────────────────────────────────
applySavedTema();
updateNotifUI();
loadIller();

loadIller();
</script>
